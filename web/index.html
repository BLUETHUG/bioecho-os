<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0F3D2E">
<title>BioEcho</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/ldl.css">
</head>
<body>

<!-- World — THE interface -->
<canvas id="world-canvas"></canvas>

<!-- Landing seed -->
<div id="landing">
  <canvas id="seed-canvas" width="200" height="200"></canvas>
</div>

<!-- Hidden UI — appears on interaction only -->
<div id="ui-layer" style="display:none">

  <!-- Side panels — appear on organism select -->
  <div class="living-panel left" id="panel-left" style="opacity:0;pointer-events:none">
    <div id="organism-list"></div>
    <div id="identity-section" style="display:none">
      <div id="identity-name" class="panel-value growth"></div>
      <div style="margin-top:8px">
        <div class="panel-row"><span class="panel-label">species</span><span class="panel-value" id="id-species">--</span></div>
        <div class="panel-row"><span class="panel-label">age</span><span class="panel-value" id="id-age">--</span></div>
      </div>
    </div>
  </div>

  <div class="living-panel right" id="panel-right" style="opacity:0;pointer-events:none">
    <div class="panel-section">
      <div class="panel-label">signal</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <div><span class="panel-value highlight" id="stat-health">--</span><br><span class="panel-label">health</span></div>
        <div><span class="panel-value" id="stat-stress">--</span><br><span class="panel-label">stress</span></div>
        <div><span class="panel-value" id="stat-spikes">--</span><br><span class="panel-label">spikes</span></div>
        <div><span class="panel-value growth" id="stat-growth">--</span><br><span class="panel-label">growth</span></div>
      </div>
      <div class="health-vine"><div class="health-vine-fill" id="health-bar" style="width:0%"></div></div>
    </div>
    <div class="panel-section">
      <div class="panel-label">environment</div>
      <div class="panel-row"><span class="panel-label">light</span><span class="panel-value" id="env-light">--</span></div>
      <div class="panel-row"><span class="panel-label">soil</span><span class="panel-value" id="env-soil">--</span></div>
      <div class="panel-row"><span class="panel-label">season</span><span class="panel-value" id="env-season">--</span></div>
    </div>
    <div class="panel-section">
      <div class="panel-label">prediction</div>
      <div class="panel-value" id="prediction-content">--</div>
    </div>
    <div class="panel-section">
      <div class="panel-label">verification</div>
      <div class="panel-row"><span class="panel-label">chains</span><span class="panel-value" id="stat-chains">0</span></div>
      <div class="panel-row"><span class="panel-label">confidence</span><span class="panel-value" id="stat-confidence">0%</span></div>
    </div>
  </div>

  <!-- Bottom nav — appears on hover at bottom edge -->
  <nav id="root-nav" style="opacity:0;pointer-events:none;transition:opacity 0.8s ease">
    <button class="root-btn" data-view="home"></button>
    <button class="root-btn" data-view="lens"></button>
    <button class="root-btn" data-view="graph"></button>
    <button class="root-btn" data-view="predict"></button>
    <button class="root-btn" data-view="search"></button>
    <button class="root-btn" data-view="earth"></button>
    <button class="root-btn" data-view="shop"></button>
  </nav>

  <!-- Action bar — appears on organism select -->
  <div class="action-bar" id="action-bar" style="opacity:0;pointer-events:none">
    <button class="organic-btn" id="btn-connect"></button>
    <button class="organic-btn" id="btn-start"></button>
    <button class="organic-btn" id="btn-scan"></button>
    <button class="organic-btn" id="btn-submit-obs"></button>
    <button class="organic-btn" id="btn-emergency"></button>
  </div>

  <!-- Content overlay -->
  <div class="content-overlay" id="content-overlay">
    <div class="content-card">
      <div class="content-card-header">
        <div class="content-card-title" id="overlay-title"></div>
        <button class="content-card-close" id="overlay-close"></button>
      </div>
      <div id="overlay-body"></div>
    </div>
  </div>

</div>

<script src="js/ldl.js"></script>
<script src="js/icons.js"></script>
<script src="js/hal.js"></script>
<script src="js/calibration.js"></script>
<script src="js/species.js"></script>
<script src="js/local-db.js"></script>
<script src="js/identity.js"></script>
<script src="js/twin.js"></script>
<script src="js/context.js"></script>
<script src="js/meaning.js"></script>
<script src="js/evidence.js"></script>
<script src="js/environment.js"></script>
<script src="js/relationship.js"></script>
<script src="js/experiment.js"></script>
<script src="js/knowledge-graph.js"></script>
<script src="js/lens.js"></script>
<script src="js/verification.js"></script>
<script src="js/citizen-science.js"></script>
<script src="js/predictive.js"></script>
<script src="js/research-assistant.js"></script>
<script src="js/bio-search.js"></script>
<script src="js/earth.js"></script>
<script src="js/timemachine.js"></script>
<script src="js/sdk.js"></script>
<script src="js/emergency.js"></script>
<script src="js/marketplace.js"></script>
<script src="js/dsp.js"></script>
<script src="js/serial.js"></script>
<script src="js/audio-capture.js"></script>
<script src="js/ambient.js"></script>
<script src="js/sound.js"></script>
<script src="js/world.js"></script>
<script src="js/firefly.js"></script>
<script src="js/tree.js"></script>
<script src="js/life.js"></script>
<script src="js/transitions.js"></script>
<script src="js/chart.js"></script>
<script src="js/chat.js"></script>
<script src="js/app.js"></script>
</body>
</html>
